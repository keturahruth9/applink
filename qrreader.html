<!DOCTYPE html>
<html>
<head>
  <title>Redirecting...</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script>
    window.onload = function () {
      var userAgent = navigator.userAgent || navigator.vendor || window.opera;

      var iosLink = "https://apps.apple.com/in/app/qr-code-reader-scan-create/id6761056096";
      var androidLink = "https://play.google.com/store/apps/details?id=com.vectorinfo.qrreader";

      var isIOS = /iPad|iPhone|iPod/.test(userAgent) && !window.MSStream;
      var isMac = /Macintosh|Mac OS X/.test(userAgent);
      var isAndroid = /android/i.test(userAgent);

      if (isIOS || isMac) {
        window.location.replace(iosLink);
      } else if (isAndroid) {
        window.location.replace(androidLink);
      } else {
        window.location.replace(androidLink);
      }
    };
  </script>
</head>

<body>
  <p>Redirecting...</p>
</body>
</html>
